<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiesto - Cart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
</head>

<body>
    <div class="navigation">
        <div class="navigation-logo">
            <img class="icon" src="images/favicon.png" alt="Fiesto Logo">
            <h1 class="title">Fiesto</h1>
        </div>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html"><img src="images/home.png"><span>Home</span></a></li>
                <li class="nav-item"><a href="menu.html"><img src="images/menu.png"><span>Menu</span></a></li>
                <li class="nav-item"><a href="cart.html"><img src="images/cart.png"><span>Cart</span></a></li>
                <li class="nav-item"><a href="checkout.html"><img src="images/checkout.png"><span>Checkout</span></a></li>
                <li onclick="openPopup()"><a href="#"><img src="images/person.png"><span class="logged-name">Login</span></a></li>
            </ul>
        </nav>
    </div>

    <div class="cart-container">
        <h3>Cart Items</h3>
        <ul id="cartItemsList"></ul>
        <div id="totalAmountContainer">
            <h4>Total Amount: <span id="totalAmount">₹0.00</span></h4>
        </div>
    </div>

    <div id="loginPopup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>
            <h2>Login</h2>
            <form id="loginForm" onsubmit="login(event)">
                <input type="text" id="username" placeholder="Username" required>
                <input type="tel" id="phone" placeholder="Phone Number" required>
                <textarea id="address" placeholder="Address for delivery" required></textarea>
                <button id="loginBtn" type="submit" style="display: inline-block;">Login</button>
            </form>
            <button id="logoutBtn" onclick="logout()" style="display: none;">Logout</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function loadCartItems() {
            const cartItemsList = document.getElementById("cartItemsList");
            const totalAmountContainer = document.getElementById("totalAmount");
            cartItemsList.innerHTML = ""; // Clear existing list items
            let totalAmount = 0;

            const cartItems = JSON.parse(sessionStorage.getItem('cartItems')) || {};

            for (const key in cartItems) {
                if (cartItems.hasOwnProperty(key)) {
                    const item = cartItems[key];
                    const listItem = document.createElement("li");
                    listItem.innerHTML = `
                        <div>
                            <h4>${item.name}</h4>
                            <p>Quantity: ${item.count}</p>
                            <p>Price: ${item.price}</p>
                        </div>
                    `;
                    cartItemsList.appendChild(listItem);

                    // Calculate total amount
                    const itemPrice = parseFloat(item.price.replace('₹', '').trim());
                    totalAmount += item.count * itemPrice;
                }
            }

            // Display total amount with 2 decimal places
            totalAmountContainer.textContent = `₹${totalAmount.toFixed(2)}`;

            // Show message if cart is empty
            if (Object.keys(cartItems).length === 0) {
                cartItemsList.innerHTML = `<p>Your cart is empty</p>
                                            <img src="images/empty-cart.png" alt="Empty Cart"/>`;
            }
        }

        // Load cart items when the page is loaded
        document.addEventListener("DOMContentLoaded", loadCartItems);
    </script>
</body>

</html>
