<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiesto - Cart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
</head>

<body>
    <div class="navigation">
        <div class="navigation-logo">
            <img class="icon" src="images/favicon.png" alt="Fiesto Logo">
            <h1 class="title">Fiesto</h1>
        </div>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html"><img src="images/home.png"><span>Home</span></a></li>
                <li class="nav-item"><a href="menu.html"><img src="images/menu.png"><span>Menu</span></a></li>
                <li class="nav-item"><a href="cart.html"><img src="images/cart.png"><span>Cart</span></a></li>
                <li class="nav-item"><a href="checkout.html"><img src="images/checkout.png"><span>Checkout</span></a>
                </li>
                <li onclick="openPopup()"><a href="#"><img src="images/person.png"><span
                            class="logged-name">Login</span></a></li>
            </ul>
        </nav>
    </div>

    <div class="cart-container">
        <h3>YOUR CART</h3>
        <ul id="cartItemsList"></ul>
        <div id="totalAmountContainer" style="display: flex; flex-direction: column; align-items: flex-end; gap: 1rem;">
            <h4>Total Amount: <span id="totalAmount">₹0.00</span></h4>
            <a href="checkout.html" class="checkout-button" style="text-decoration: none; padding: 12px 24px;">Proceed
                to Checkout</a>
        </div>
    </div>

    <div id="loginPopup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>
            <h2>Login</h2>
            <form id="loginForm" onsubmit="login(event)">
                <input type="text" id="username" placeholder="Username" required>
                <input type="tel" id="phone" placeholder="Phone Number" required>
                <textarea id="address" placeholder="Address for delivery" required></textarea>
                <button id="loginBtn" type="submit" style="display: inline-block;">Login</button>
            </form>
            <button id="logoutBtn" onclick="logout()" style="display: none;">Logout</button>
        </div>
    </div>

    <footer
        style="margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--border); background: var(--bg-card); text-align: center; color: var(--text-muted);">
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 1rem;">
            <img src="images/favicon.png" alt="Fiesto Logo" style="height: 30px; filter: grayscale(1);">
            <h2 style="margin: 0; color: var(--text-main); font-size: 1.2rem;">Fiesto</h2>
        </div>
        <p style="margin: 0; font-size: 0.9rem;">&copy; 2024 Fiesto Delivery. All rights reserved.</p>
        <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 15px; font-size: 0.85rem;">
            <a href="#" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a> |
            <a href="#" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
        </div>
    </footer>

    <script src="utils.js"></script>
    <script src="script.js"></script>
    <script>
        function loadCartItems() {
            const cartItemsList = document.getElementById("cartItemsList");
            const totalAmountContainer = document.getElementById("totalAmount");
            cartItemsList.innerHTML = ""; // Clear existing list items
            let totalAmount = 0;

            const cartItems = JSON.parse(sessionStorage.getItem('cartItems')) || {};

            for (const key in cartItems) {
                if (cartItems.hasOwnProperty(key)) {
                    const item = cartItems[key];
                    const listItem = document.createElement("li");
                    listItem.innerHTML = `
                        <div>
                            <h4>${item.name}</h4>
                            <p>Quantity: ${item.count}</p>
                            <p>Price: ${item.price}</p>
                        </div>
                    `;
                    cartItemsList.appendChild(listItem);

                    const itemPriceStr = String(item.price).replace(/[^\d.]/g, '');
                    const itemPrice = parseFloat(itemPriceStr);
                    totalAmount += item.count * itemPrice;
                }
            }
            totalAmountContainer.textContent = `₹${totalAmount.toFixed(2)}`;

            if (Object.keys(cartItems).length === 0) {
                cartItemsList.style.display = 'block';
                cartItemsList.innerHTML = `
                    <div style="padding: 2rem 0;">
                        <img src="images/cart.png" alt="Empty Cart" style="height: 60px; filter: invert(1) opacity(0.5); margin-bottom: 1rem;"/>
                        <h4 style="color: var(--text-main); margin-bottom: 0.5rem; font-size: 1.4rem;">Your cart is empty</h4>
                        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Looks like you haven't added any items yet.</p>
                        <a href="menu.html" class="checkout-button" style="text-decoration: none; display: inline-block;">Explore Menu</a>
                    </div>
                `;
                totalAmountContainer.parentElement.style.display = 'none';
            } else {
                cartItemsList.style.display = 'flex';
                totalAmountContainer.parentElement.style.display = 'flex';
            }
        }

        document.addEventListener("DOMContentLoaded", loadCartItems);
    </script>
</body>

</html>
